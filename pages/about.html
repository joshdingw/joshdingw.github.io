      <h1>关于星序</h1>
      <p>
        星序 AI 是一个仍在早期搭建中的项目，目标是从量化学习出发，逐步构建一套面向 AI 时代的成长路径系统。
      </p>

      <div class="card" style="margin-top: 24px;">
        <h3>为什么做这个项目</h3>
        <p>
          因为很多学习者并不缺内容，而是缺少路径、结构、实践场景与长期成长方法。
          星序希望把这些重新组织起来。
        </p>
